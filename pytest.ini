[pytest]
;addopts = -vs --alluredir ./report/temp -p no:warnings --clean-alluredir
;testpaths = ./testcase/
; addopts：pytest 的默认命令行参数（这里被注释掉了）
; -v           ：显示更详细的测试输出
; -s           ：允许打印 print 输出
; --alluredir  ：指定 Allure 测试报告临时目录
; -p no:warnings：禁用 pytest 自带的 warning 插件
; --clean-alluredir：运行前清空 allure 目录
; addopts = -vs --alluredir ./report/temp -p no:warnings --clean-alluredir
; testpaths：指定测试用例目录（默认从当前目录开始收集）


filterwarnings =
    error
    ; 将所有 warning 当作 error 处理，遇到 warning 测试直接失败（用于提高代码质量）
    ignore::UserWarning
    ; 忽略 UserWarning 类型的警告（避免第三方库产生的无关警告影响测试）

python_files = test_*.py
; 指定 pytest 识别的测试文件名规则
; 只有以 test_ 开头的 .py 文件会被当作测试文件

python_classes = Test*
; 指定 pytest 识别的测试类名规则
; 只有以 Test 开头的类才会被当作测试类

python_functions = test
; 指定 pytest 识别的测试函数名规则
; 这里表示函数名中包含 test 的都会被识别为测试函数